{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header" style="background-color: var(--accent); color: white;">
                    <h4 class="mb-0">Сброс пароля</h4>
                </div>
                <div class="card-body">
                    <p>Введите email, чтобы получить ссылку для сброса пароля.</p>
                    <form method="post" action="{% url 'account_reset_password' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" id="id_email" required>
                        </div>
                        <button type="submit" class="btn btn-gold w-100">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
