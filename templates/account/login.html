{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header" style="background-color: var(--accent); color: white;">
                    <h4 class="mb-0">Вход</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="{% url 'account_login' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_login" class="form-label">Email</label>
                            <input type="email" name="login" class="form-control" id="id_login" required>
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-control" id="id_password" required>
                        </div>
                        {% if form.errors %}
                        <div class="alert alert-danger">
                            Неверный email или пароль
                        </div>
                        {% endif %}
                        <button type="submit" class="btn btn-gold w-100">Войти</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        Нет аккаунта? <a href="{% url 'account_signup' %}">Зарегистрироваться</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
