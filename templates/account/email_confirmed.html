{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-header" style="background-color: var(--accent); color: white;">
                    <h4 class="mb-0">Email подтверждён!</h4>
                </div>
                <div class="card-body">
                    <i class="fas fa-check-circle fa-4x mb-3" style="color: #28a745;"></i>
                    <h5>Регистрация завершена</h5>
                    <p class="mt-3">
                        Ваш email успешно подтверждён. Теперь вы можете войти в свой аккаунт.
                    </p>
                    <a href="{% url 'account_login' %}" class="btn btn-gold mt-3">Войти</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
