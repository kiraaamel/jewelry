{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Дополнительные стили для модального окна выбора размера */
    .size-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    
    .size-modal.active {
        display: flex;
    }
    
    .size-modal-content {
        background: white;
        border-radius: 24px;
        padding: 30px;
        max-width: 350px;
        width: 90%;
        text-align: center;
    }
    
    .size-modal-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 20px;
    }
    
    .size-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin: 20px 0;
    }
    
    .size-btn-modal {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        border: 1px solid var(--accent);
        background: white;
        color: var(--accent);
        cursor: pointer;
        transition: all 0.3s;
        font-size: 16px;
    }
    
    .size-btn-modal:hover, .size-btn-modal.selected {
        background: var(--accent);
        color: white;
    }
    
    .modal-close {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 24px;
        cursor: pointer;
        color: var(--gray);
    }
    
    .quantity-input {
        width: 60px;
        text-align: center;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin: 10px 0;
    }
    
    .add-to-cart-btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 30px;
        cursor: pointer;
        font-weight: 600;
        width: 100%;
        margin-top: 10px;
    }
</style>

<div class="container py-4">
    <div class="row">
        <!-- Боковая панель с фильтрами -->
        <div class="col-md-3">
            <div class="card shadow-sm mb-4">
                <div class="card-header" style="background-color: var(--accent); color: white;">
                    <h5 class="mb-0">Фильтры</h5>
                </div>
                <div class="card-body">
                    <!-- Фильтр по категории -->
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Категория</label>
                        <div id="category-filter">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="category" value="" id="cat-all" checked>
                                <label class="form-check-label" for="cat-all">Все категории</label>
                            </div>
                            <div id="categories-list">
                                <div class="text-secondary">Загрузка...</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Фильтр по типу серебра -->
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Тип серебра</label>
                        <div id="silver-type-filter">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="silver_type" value="" id="silver-all" checked>
                                <label class="form-check-label" for="silver-all">Все</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="silver_type" value="sterling" id="silver-sterling">
                                <label class="form-check-label" for="silver-sterling">Стерлинговое (925)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="silver_type" value="fine" id="silver-fine">
                                <label class="form-check-label" for="silver-fine">Чистое (999)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="silver_type" value="oxidized" id="silver-oxidized">
                                <label class="form-check-label" for="silver-oxidized">Черненое</label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Фильтр по пробе -->
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Проба серебра</label>
                        <div id="fineness-filter">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="fineness" value="" id="fineness-all" checked>
                                <label class="form-check-label" for="fineness-all">Все</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="fineness" value="925" id="fineness-925">
                                <label class="form-check-label" for="fineness-925">925 проба</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="fineness" value="875" id="fineness-875">
                                <label class="form-check-label" for="fineness-875">875 проба</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="fineness" value="830" id="fineness-830">
                                <label class="form-check-label" for="fineness-830">830 проба</label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Фильтр по цене -->
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Цена (₽)</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <input type="number" class="form-control form-control-sm" id="price-min" placeholder="От">
                            </div>
                            <div class="col-6">
                                <input type="number" class="form-control form-control-sm" id="price-max" placeholder="До">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Фильтр по наличию камней -->
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Драгоценные камни</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="stones-filter">
                            <label class="form-check-label" for="stones-filter">С камнями</label>
                        </div>
                    </div>
                    
                    <!-- Фильтр по акции (скидка) -->
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Акция</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="discount-filter">
                            <label class="form-check-label" for="discount-filter">Товары со скидкой</label>
                        </div>
                    </div>
                    
                    <!-- Кнопки -->
                    <button class="btn btn-gold w-100 mb-2" id="apply-filters" style="background-color: var(--accent); color: white;">Применить</button>
                    <button class="btn btn-outline-secondary w-100" id="reset-filters">Сбросить</button>
                </div>
            </div>
        </div>
        
        <!-- Список товаров -->
        <div class="col-md-9">
            <!-- Информация о поиске -->
            <div id="search-info" class="alert alert-info mb-3" style="display: none; background-color: #e8f4f8; border-color: var(--accent); color: var(--accent);">
                <i class="fas fa-search"></i> <span id="search-query-text"></span>
                <button type="button" class="btn-close float-end" onclick="clearSearch()"></button>
            </div>
            
            <!-- Сортировка и информация -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div>
                    <span class="text-secondary" id="products-count">Загрузка...</span>
                </div>
                <div class="d-flex gap-2">
                    <label class="fw-bold me-2">Сортировка:</label>
                    <select class="form-select form-select-sm w-auto" id="sort-select">
                        <option value="-created_at">По новизне</option>
                        <option value="price">Цена (по возрастанию)</option>
                        <option value="-price">Цена (по убыванию)</option>
                        <option value="-average_rating">По популярности (рейтинг)</option>
                    </select>
                </div>
            </div>
            
            <!-- Результаты -->
            <div id="products-container" class="row">
                <div class="col-12 text-center text-secondary py-5">Загрузка...</div>
            </div>
            
            <!-- Пагинация -->
            <div id="pagination" class="d-flex justify-content-center mt-4"></div>
        </div>
    </div>
</div>

<!-- Модальное окно выбора размера -->
<div id="size-modal" class="size-modal">
    <div class="size-modal-content">
        <span class="modal-close" onclick="closeSizeModal()">&times;</span>
        <div class="size-modal-title">Выберите размер</div>
        <div id="size-options" class="size-buttons"></div>
        <div>
            <label>Количество:</label>
            <input type="number" id="modal-quantity" class="quantity-input" value="1" min="1">
        </div>
        <button class="add-to-cart-btn" onclick="confirmAddToCart()">Добавить в корзину</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;
    let selectedProductId = null;
    let selectedProductSizes = [];
    
    // Загрузка категорий
    function loadCategories() {
        fetch('/api/categories/')
            .then(response => response.json())
            .then(categories => {
                const container = document.getElementById('categories-list');
                if (!container) return;
                container.innerHTML = '';
                categories.forEach(cat => {
                    container.innerHTML += `
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="category" value="${cat.id}" id="cat-${cat.id}">
                            <label class="form-check-label" for="cat-${cat.id}">${cat.name}</label>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Error loading categories:', error));
    }
    
    // Построение URL с параметрами
    function buildUrl() {
        let url = '/api/products/?';
        const params = [];
        
        // Поиск из URL
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('search');
        if (searchQuery) {
            params.push(`search=${encodeURIComponent(searchQuery)}`);
            // Показываем информацию о поиске
            const searchInfo = document.getElementById('search-info');
            const searchQueryText = document.getElementById('search-query-text');
            if (searchInfo && searchQueryText) {
                searchInfo.style.display = 'block';
                searchQueryText.innerHTML = `Результаты поиска: "${searchQuery}"`;
            }
        } else {
            const searchInfo = document.getElementById('search-info');
            if (searchInfo) searchInfo.style.display = 'none';
        }
        
        // Категория
        const selectedCategory = document.querySelector('input[name="category"]:checked');
        if (selectedCategory && selectedCategory.value) {
            params.push(`category=${selectedCategory.value}`);
        }
        
        // Тип серебра
        const selectedSilverType = document.querySelector('input[name="silver_type"]:checked');
        if (selectedSilverType && selectedSilverType.value) {
            params.push(`silver_type=${selectedSilverType.value}`);
        }
        
        // Проба
        const selectedFineness = document.querySelector('input[name="fineness"]:checked');
        if (selectedFineness && selectedFineness.value) {
            params.push(`fineness=${selectedFineness.value}`);
        }
        
        // Цена
        const priceMin = document.getElementById('price-min').value;
        const priceMax = document.getElementById('price-max').value;
        if (priceMin) params.push(`price_min=${priceMin}`);
        if (priceMax) params.push(`price_max=${priceMax}`);
        
        // Камни
        const stonesFilter = document.getElementById('stones-filter').checked;
        if (stonesFilter) params.push(`stones=true`);
        
        // Акция
        const discountFilter = document.getElementById('discount-filter').checked;
        if (discountFilter) params.push(`has_discount=true`);
        
        // Сортировка
        const sort = document.getElementById('sort-select').value;
        params.push(`ordering=${sort}`);
        
        // Пагинация
        params.push(`page=${currentPage}`);
        params.push(`page_size=9`);
        
        return url + params.join('&');
    }
    
    // Отрисовка карточки товара
    function renderProductCard(product) {
        const discountBadge = product.discount_percent > 0 
            ? `<span class="badge bg-danger position-absolute top-0 start-0 m-2">-${product.discount_percent}%</span>`
            : '';
        
        const priceHtml = product.old_price 
            ? `<span class="text-gold fw-bold fs-4">${product.price} ₽</span>
               <span class="text-secondary text-decoration-line-through ms-2">${product.old_price} ₽</span>`
            : `<span class="text-gold fw-bold fs-4">${product.price} ₽</span>`;
        
        // Получаем первое доступное изображение
        let imageUrl = product.image;
        if (!imageUrl && product.image_2) imageUrl = product.image_2;
        if (!imageUrl && product.image_3) imageUrl = product.image_3;
        
        const imageHtml = imageUrl 
            ? `<img src="${imageUrl}" alt="${product.name}" class="card-img-top" style="height: 250px; object-fit: cover;">`
            : `<div class="card-img-top bg-secondary d-flex align-items-center justify-content-center" style="height: 250px;">
                 <i class="fas fa-gem fa-4x text-gold"></i>
               </div>`;
        
        const silverTypeText = product.silver_type_display || '';
        const finenessText = product.fineness_display || '';
        const ratingStars = product.average_rating > 0 
            ? '★'.repeat(Math.round(product.average_rating)) + '☆'.repeat(5 - Math.round(product.average_rating)) 
            : '☆'.repeat(5);
        
        // Получаем размеры из товара (если есть)
        const sizes = product.size ? product.size.split(',').map(s => s.trim()) : [];
        
        return `
            <div class="col-md-4 mb-4">
                <div class="card h-100 position-relative product-card shadow-sm">
                    ${discountBadge}
                    ${imageHtml}
                    <div class="card-body">
                        <div class="text-muted small mb-1">${product.category_name || 'Украшение'}</div>
                        <h5 class="card-title">
                            <a href="/product/${product.id}/" class="text-dark text-decoration-none">${product.name}</a>
                        </h5>
                        <div class="text-muted small mb-2">${silverTypeText} ${finenessText}</div>
                        <div class="mb-2">
                            <small class="text-warning">${ratingStars}</small>
                            <small class="text-secondary ms-2">(${product.reviews_count || 0})</small>
                        </div>
                        <div class="mb-3">${priceHtml}</div>
                        <button class="btn btn-gold w-100" onclick="openSizeModal(${product.id}, '${product.name.replace(/'/g, "\\'")}', ${JSON.stringify(sizes).replace(/"/g, '&quot;')})">
                            <i class="fas fa-shopping-cart"></i> В корзину
                        </button>
                    </div>
                </div>
            </div>
        `;
    }
    
    // Открыть модальное окно выбора размера
    function openSizeModal(productId, productName, sizes) {
        selectedProductId = productId;
        selectedProductSizes = sizes;
        
        const sizeContainer = document.getElementById('size-options');
        if (!sizeContainer) return;
        
        if (sizes.length === 0) {
            sizeContainer.innerHTML = '<div class="text-secondary">Размер не указан</div>';
        } else {
            let sizesHtml = '';
            sizes.forEach(size => {
                sizesHtml += `<button class="size-btn-modal" data-size="${size}" onclick="selectSize(this, '${size}')">${size}</button>`;
            });
            sizeContainer.innerHTML = sizesHtml;
        }
        
        document.getElementById('modal-quantity').value = 1;
        document.getElementById('size-modal').classList.add('active');
    }
    
    function selectSize(element, size) {
        document.querySelectorAll('.size-btn-modal').forEach(btn => {
            btn.classList.remove('selected');
        });
        element.classList.add('selected');
        window.selectedSize = size;
    }
    
    function closeSizeModal() {
        document.getElementById('size-modal').classList.remove('active');
        window.selectedSize = null;
        selectedProductId = null;
    }
    
    function confirmAddToCart() {
        const selectedSizeBtn = document.querySelector('.size-btn-modal.selected');
        const selectedSize = selectedSizeBtn ? selectedSizeBtn.getAttribute('data-size') : null;
        const quantity = parseInt(document.getElementById('modal-quantity').value) || 1;
        
        // Проверка авторизации
        const isAuth = document.body.classList.contains('user-authenticated');
        
        if (!isAuth) {
            closeSizeModal();
            showNotification('Войдите, чтобы добавить товар в корзину');
            setTimeout(() => {
                window.location.href = '/accounts/login/';
            }, 1500);
            return;
        }
        
        if (selectedProductSizes.length > 0 && !selectedSize) {
            showNotification('Пожалуйста, выберите размер');
            return;
        }
        
        // Отправляем запрос на добавление в корзину
        fetch('/api/cart/add_item/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                product_id: selectedProductId,
                quantity: quantity,
                size: selectedSize || ''
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw new Error(err.error || 'Ошибка'); });
            }
            return response.json();
        })
        .then(() => {
            closeSizeModal();
            updateCartCount();
            showNotification('Товар добавлен в корзину!');
        })
        .catch(error => {
            console.error('Error:', error);
            showNotification(error.message || 'Ошибка при добавлении в корзину');
        });
    }
    
    // Загрузка товаров
    function loadProducts() {
        const url = buildUrl();
        const container = document.getElementById('products-container');
        if (!container) return;
        container.innerHTML = '<div class="col-12 text-center text-secondary py-5">Загрузка...</div>';
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                container.innerHTML = '';
                const products = data.results || data;
                totalPages = Math.ceil((data.count || products.length) / 9);
                
                const countElement = document.getElementById('products-count');
                if (countElement) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const searchQuery = urlParams.get('search');
                    if (searchQuery) {
                        countElement.innerHTML = `Найдено товаров по запросу "${searchQuery}": ${data.count || products.length}`;
                    } else {
                        countElement.innerHTML = `Найдено товаров: ${data.count || products.length}`;
                    }
                }
                
                if (products.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center text-secondary py-5">Товаров не найдено</div>';
                    return;
                }
                
                products.forEach(product => {
                    container.innerHTML += renderProductCard(product);
                });
                
                renderPagination();
            })
            .catch(error => {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="col-12 text-center text-danger py-5">Ошибка загрузки товаров</div>';
            });
    }
    
    // Пагинация
    function renderPagination() {
        const container = document.getElementById('pagination');
        if (!container) return;
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }
        
        let html = '<nav><ul class="pagination">';
        
        html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${currentPage - 1}); return false;">«</a>
                 </li>`;
        
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                html += `<li class="page-item ${currentPage === i ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="goToPage(${i}); return false;">${i}</a>
                         </li>`;
            } else if (i === currentPage - 3 || i === currentPage + 3) {
                html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
        }
        
        html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${currentPage + 1}); return false;">»</a>
                 </li>`;
        
        html += '</ul></nav>';
        container.innerHTML = html;
    }
    
    function goToPage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        loadProducts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function clearSearch() {
        const url = new URL(window.location.href);
        url.searchParams.delete('search');
        window.location.href = url.toString();
    }
    
    // События
    const applyBtn = document.getElementById('apply-filters');
    if (applyBtn) {
        applyBtn.addEventListener('click', () => {
            currentPage = 1;
            loadProducts();
        });
    }
    
    const resetBtn = document.getElementById('reset-filters');
    if (resetBtn) {
        resetBtn.addEventListener('click', () => {
            document.querySelectorAll('input[name="category"]').forEach(r => r.checked = false);
            const catAll = document.getElementById('cat-all');
            if (catAll) catAll.checked = true;
            document.querySelectorAll('input[name="silver_type"]').forEach(r => r.checked = false);
            const silverAll = document.getElementById('silver-all');
            if (silverAll) silverAll.checked = true;
            document.querySelectorAll('input[name="fineness"]').forEach(r => r.checked = false);
            const finenessAll = document.getElementById('fineness-all');
            if (finenessAll) finenessAll.checked = true;
            const priceMin = document.getElementById('price-min');
            const priceMax = document.getElementById('price-max');
            if (priceMin) priceMin.value = '';
            if (priceMax) priceMax.value = '';
            const stonesFilter = document.getElementById('stones-filter');
            if (stonesFilter) stonesFilter.checked = false;
            const discountFilter = document.getElementById('discount-filter');
            if (discountFilter) discountFilter.checked = false;
            const sortSelect = document.getElementById('sort-select');
            if (sortSelect) sortSelect.value = '-created_at';
            currentPage = 1;
            loadProducts();
        });
    }
    
    const sortSelect = document.getElementById('sort-select');
    if (sortSelect) {
        sortSelect.addEventListener('change', () => {
            currentPage = 1;
            loadProducts();
        });
    }
    
    function showNotification(message) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.textContent = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2000);
    }
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    function updateCartCount() {
        fetch('/api/cart/')
            .then(response => response.json())
            .then(data => {
                const count = data.total_items || 0;
                const cartCount = document.getElementById('cart-count');
                if (cartCount) cartCount.textContent = count;
            })
            .catch(error => console.error('Error:', error));
    }
    
    // Инициализация
    loadCategories();
    loadProducts();
</script>
{% endblock %}
