{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .filter-section {
        background: white;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .filter-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 15px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e9ecef;
    }
    .filter-group {
        margin-bottom: 20px;
    }
    .filter-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--brown);
        margin-bottom: 8px;
        display: block;
    }
    .filter-select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 13px;
        background: white;
        color: var(--brown);
    }
    .price-inputs {
        display: flex;
        gap: 10px;
        width: 100%;
    }
    .price-inputs input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 12px;
        font-size: 13px;
        min-width: 0;
    }
    .btn-apply {
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
    }
    .btn-reset {
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
    }
    .products-count {
        font-size: 14px;
        color: var(--gray);
        margin-bottom: 15px;
    }
    .sort-select {
        padding: 8px 16px;
        border: 1px solid #ddd;
        border-radius: 30px;
        font-size: 13px;
        background: white;
    }
    .product-card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        transition: transform 0.3s;
        height: 100%;
        position: relative;
    }
    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .product-image-wrapper {
        position: relative;
    }
    .product-image {
        height: 250px;
        object-fit: cover;
        width: 100%;
    }
    .favorite-icon-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.5);
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s;
        backdrop-filter: blur(4px);
        z-index: 10;
    }
    .favorite-icon-btn:hover {
        transform: scale(1.1);
        background: rgba(0,0,0,0.7);
    }
    .favorite-icon-btn i {
        font-size: 18px;
    }
    .discount-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #ff4444;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: bold;
        z-index: 10;
    }
    .product-info {
        padding: 15px;
    }
    .product-info a {
        text-decoration: none !important;
        color: inherit;
    }
    .product-category {
        font-size: 11px;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .product-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--brown);
        margin: 8px 0;
    }
    .product-price {
        font-size: 18px;
        font-weight: 700;
        color: var(--accent);
        margin: 10px 0;
    }
    .old-price {
        font-size: 13px;
        color: var(--gray);
        text-decoration: line-through;
        margin-left: 8px;
        font-weight: normal;
    }
    .rating {
        margin: 8px 0;
    }
    .rating-stars {
        color: #ffc107;
        font-size: 12px;
    }
    .product-sizes {
        font-size: 11px;
        color: var(--gray);
        margin: 8px 0;
    }
    .btn-cart {
        width: 100%;
        padding: 10px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
    }
    .btn-cart:hover {
        background: #4a5a6a;
        transform: translateY(-2px);
    }
    .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 30px;
        flex-wrap: wrap;
    }
    .page-link {
        padding: 8px 14px;
        border: 1px solid #ddd;
        border-radius: 30px;
        color: var(--brown);
        text-decoration: none;
        font-size: 13px;
        cursor: pointer;
    }
    .page-link.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal.active {
        display: flex;
    }
    .modal-content {
        background: white;
        border-radius: 24px;
        padding: 30px;
        max-width: 350px;
        width: 90%;
        text-align: center;
    }
    .size-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin: 20px 0;
    }
    .size-btn {
        padding: 10px 20px;
        border: 1px solid var(--accent);
        border-radius: 30px;
        background: white;
        cursor: pointer;
    }
    .size-btn.selected {
        background: var(--accent);
        color: white;
    }
    .notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--accent);
        color: var(--bg-cream);
        padding: 12px 24px;
        border-radius: 30px;
        z-index: 1000;
        animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
</style>

<div class="container py-4">
    <div class="row">
        <div class="col-md-3">
            <div class="filter-section">
                <div class="filter-title">Фильтры</div>
                <div class="filter-group">
                    <label class="filter-label">Категория</label>
                    <select id="filter-category" class="filter-select">
                        <option value="">Все категории</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Тип серебра</label>
                    <select id="filter-silver-type" class="filter-select">
                        <option value="">Все</option>
                        <option value="sterling">Стерлинговое (925)</option>
                        <option value="fine">Чистое (999)</option>
                        <option value="oxidized">Черненое</option>
                        <option value="matte">Матовое</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Проба</label>
                    <select id="filter-fineness" class="filter-select">
                        <option value="">Все</option>
                        <option value="925">925 проба</option>
                        <option value="875">875 проба</option>
                        <option value="830">830 проба</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Цена (₽)</label>
                    <div class="price-inputs">
                        <input type="number" id="price-min" placeholder="От">
                        <input type="number" id="price-max" placeholder="До">
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Камни</label>
                    <select id="filter-stones" class="filter-select">
                        <option value="">Все</option>
                        <option value="true">С камнями</option>
                        <option value="false">Без камней</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Тип камня</label>
                    <select id="filter-stone-type" class="filter-select">
                        <option value="">Любой</option>
                        <option value="diamond">Бриллиант</option>
                        <option value="ruby">Рубин</option>
                        <option value="pearl">Жемчуг</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Акция</label>
                    <select id="filter-discount" class="filter-select">
                        <option value="">Все</option>
                        <option value="true">Со скидкой</option>
                    </select>
                </div>
                <button class="btn-apply" id="apply-filters">Применить</button>
                <button class="btn-reset" id="reset-filters">Сбросить</button>
            </div>
        </div>
        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <div class="products-count" id="products-count">Загрузка...</div>
                <select class="sort-select" id="sort-select">
                    <option value="-created_at">По новизне</option>
                    <option value="price">Цена (по возрастанию)</option>
                    <option value="-price">Цена (по убыванию)</option>
                    <option value="-average_rating">По популярности</option>
                </select>
            </div>
            <div class="row" id="products-container">
                <div class="col-12 text-center py-5 text-secondary">Загрузка...</div>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>
</div>

<div id="size-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:20px; color:var(--accent);">Выберите размер</h3>
        <div id="size-options" class="size-buttons"></div>
        <div>
            <label>Количество:</label>
            <input type="number" id="modal-quantity" value="1" min="1" style="width:80px; padding:8px; margin-left:10px; border:1px solid #ddd; border-radius:8px;">
        </div>
        <button id="confirm-add-to-cart" style="margin-top:20px; padding:12px 24px; background:var(--accent); color:white; border:none; border-radius:30px; cursor:pointer;">Добавить в корзину</button>
        <button onclick="closeSizeModal()" style="margin-top:10px; padding:8px 20px; background:transparent; border:none; cursor:pointer;">Отмена</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let totalPages = 1;
let selectedProductId = null;
let selectedProductSizes = [];
let selectedSize = null;
let currentFavorites = [];

function buildUrl() {
    let url = '/api/products/?';
    const params = [];
    const urlParams = new URLSearchParams(window.location.search);
    const searchQuery = urlParams.get('search');
    if (searchQuery) params.push(`search=${encodeURIComponent(searchQuery)}`);
    const category = document.getElementById('filter-category').value;
    if (category) params.push(`category=${category}`);
    const silverType = document.getElementById('filter-silver-type').value;
    if (silverType) params.push(`silver_type=${silverType}`);
    const fineness = document.getElementById('filter-fineness').value;
    if (fineness) params.push(`fineness=${fineness}`);
    let priceMin = document.getElementById('price-min').value;
    let priceMax = document.getElementById('price-max').value;
    if (priceMin && parseFloat(priceMin) < 0) priceMin = 0;
    if (priceMax && parseFloat(priceMax) < 0) priceMax = 0;
    if (priceMin) params.push(`price_min=${priceMin}`);
    if (priceMax) params.push(`price_max=${priceMax}`);
    const stones = document.getElementById('filter-stones').value;
    if (stones === 'true') params.push(`stones=true`);
    if (stones === 'false') params.push(`stones=false`);
    const stoneType = document.getElementById('filter-stone-type').value;
    if (stoneType) params.push(`stone_type=${stoneType}`);
    const discount = document.getElementById('filter-discount').value;
    if (discount === 'true') params.push(`has_discount=true`);
    const sort = document.getElementById('sort-select').value;
    params.push(`ordering=${sort}`);
    params.push(`page=${currentPage}`);
    params.push(`page_size=9`);
    return url + params.join('&');
}

function loadCategories() {
    fetch('/api/categories/')
        .then(r => r.json())
        .then(data => {
            const select = document.getElementById('filter-category');
            data.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });
        });
}

function loadFavorites() {
    return fetch('/api/favorites/')
        .then(r => r.json())
        .then(data => {
            currentFavorites = data;
            return currentFavorites;
        })
        .catch(() => {
            currentFavorites = [];
            return currentFavorites;
        });
}

function isInFavorites(productId) {
    return currentFavorites.some(f => f.product.id === productId);
}

function renderProductCard(product) {
    const discount = product.discount_percent > 0 ? `<span class="discount-badge">-${product.discount_percent}%</span>` : '';
    const oldPrice = product.old_price ? `<span class="old-price">${product.old_price} ₽</span>` : '';
    const imageUrl = product.image || '/static/shop/images/placeholder.png';
    const rating = product.average_rating || 0;
    const stars = '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
    const sizes = product.size ? product.size.split(',').map(s => s.trim()) : [];
    const sizesJson = JSON.stringify(sizes).replace(/"/g, '&quot;');
    const inFav = isInFavorites(product.id);
    const heartColor = inFav ? '#ff4444' : 'white';
    
    return `
        <div class="col-md-4 mb-4">
            <div class="product-card">
                <div class="product-image-wrapper">
                    <a href="/product/${product.id}/">
                        <img src="${imageUrl}" class="product-image" onerror="this.src='/static/shop/images/placeholder.png'">
                    </a>
                    <button class="favorite-icon-btn" data-product-id="${product.id}" onclick="toggleFavoriteInCatalog(${product.id}, event)">
                        <i class="fas fa-heart" style="color: ${heartColor};"></i>
                    </button>
                    ${discount}
                </div>
                <div class="product-info">
                    <div class="product-category">${product.category_name || 'Украшение'}</div>
                    <a href="/product/${product.id}/">
                        <div class="product-name">${escapeHtml(product.name)}</div>
                    </a>
                    <div class="rating">
                        <span class="rating-stars">${stars}</span>
                        <span class="text-secondary ms-1">(${product.reviews_count || 0})</span>
                    </div>
                    <div class="product-price">
                        ${product.price} ₽ ${oldPrice}
                    </div>
                    <div class="product-sizes">
                        ${sizes.length > 0 ? `Размеры: ${sizes.join(', ')}` : '<span class="text-muted">Без размера</span>'}
                    </div>
                    <button class="btn-cart" data-product-id="${product.id}" data-sizes='${sizesJson}'>В корзину</button>
                </div>
            </div>
        </div>
    `;
}

function loadProducts() {
    const url = buildUrl();
    const container = document.getElementById('products-container');
    container.innerHTML = '<div class="col-12 text-center py-5 text-secondary">Загрузка...</div>';
    
    loadFavorites().then(() => {
        fetch(url)
            .then(r => r.json())
            .then(data => {
                const products = data.results || data;
                totalPages = Math.ceil((data.count || products.length) / 9);
                document.getElementById('products-count').textContent = `Найдено товаров: ${data.count || products.length}`;
                if (products.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center py-5 text-secondary">Товаров не найдено</div>';
                    return;
                }
                container.innerHTML = '';
                products.forEach(product => {
                    container.innerHTML += renderProductCard(product);
                });
                renderPagination();
            })
            .catch(error => {
                console.error('Error:', error);
                container.innerHTML = '<div class="col-12 text-center py-5 text-danger">Ошибка загрузки</div>';
            });
    });
}

function renderPagination() {
    const container = document.getElementById('pagination');
    if (totalPages <= 1) {
        container.innerHTML = '';
        return;
    }
    let html = '';
    for (let i = 1; i <= totalPages; i++) {
        html += `<a href="#" class="page-link ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i}); return false;">${i}</a>`;
    }
    container.innerHTML = html;
}

function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    loadProducts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openSizeModal(productId, sizes) {
    selectedProductId = productId;
    selectedProductSizes = sizes || [];
    selectedSize = null;
    const container = document.getElementById('size-options');
    if (!container) return;
    if (!sizes || sizes.length === 0) {
        container.innerHTML = '<div class="text-secondary">Размер не указан</div>';
    } else {
        let html = '';
        sizes.forEach(size => {
            html += `<button class="size-btn" data-size="${size}">${size}</button>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedSize = this.dataset.size;
            };
        });
    }
    document.getElementById('modal-quantity').value = 1;
    document.getElementById('size-modal').classList.add('active');
}

function closeSizeModal() {
    document.getElementById('size-modal').classList.remove('active');
    selectedProductId = null;
    selectedSize = null;
}

function addToCart() {
    const quantity = document.getElementById('modal-quantity').value;
    if (selectedProductSizes.length > 0 && !selectedSize) {
        alert('Выберите размер');
        return;
    }
    fetch('/api/cart/add_item/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({
            product_id: selectedProductId,
            quantity: parseInt(quantity),
            size: selectedSize || ''
        })
    })
    .then(response => response.json())
    .then(() => {
        closeSizeModal();
        updateCartCount();
        showNotification('Товар добавлен в корзину!');
    })
    .catch(error => {
        console.error('Error:', error);
        showNotification('Ошибка при добавлении в корзину');
    });
}

function toggleFavoriteInCatalog(productId, event) {
    event.stopPropagation();
    event.preventDefault();
    
    const btn = event.currentTarget;
    const icon = btn.querySelector('i');
    const isActive = icon.style.color === 'rgb(255, 68, 68)' || icon.style.color === '#ff4444';
    
    if (!isAuthenticated()) {
        showNotification('Войдите, чтобы добавить в избранное');
        setTimeout(() => {
            window.location.href = '/accounts/login/';
        }, 1500);
        return;
    }
    
    if (isActive) {
        const favorite = currentFavorites.find(f => f.product.id === productId);
        if (favorite) {
            fetch(`/api/favorites/${favorite.id}/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            })
            .then(() => {
                icon.style.color = 'white';
                currentFavorites = currentFavorites.filter(f => f.id !== favorite.id);
                showNotification('Удалено из избранного');
                updateFavoritesCount();
            })
            .catch(error => console.error('Error:', error));
        }
    } else {
        fetch('/api/favorites/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ product_id: productId })
        })
        .then(response => response.json())
        .then(data => {
            icon.style.color = '#ff4444';
            currentFavorites.push(data);
            showNotification('Добавлено в избранное');
            updateFavoritesCount();
        })
        .catch(error => console.error('Error:', error));
    }
}

function showNotification(message) {
    const notification = document.createElement('div');
    notification.className = 'notification';
    notification.textContent = message;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 2000);
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function updateCartCount() {
    fetch('/api/cart/')
        .then(response => response.json())
        .then(data => {
            const count = data.total_items || 0;
            const cartCount = document.getElementById('cart-count');
            if (cartCount) cartCount.textContent = count;
        })
        .catch(error => console.error('Error:', error));
}

function updateFavoritesCount() {
    const favoritesCount = document.getElementById('favorites-count');
    if (favoritesCount) {
        favoritesCount.textContent = currentFavorites.length;
    }
}

function isAuthenticated() {
    return document.body.classList.contains('user-authenticated');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('apply-filters').addEventListener('click', () => { currentPage = 1; loadProducts(); });
document.getElementById('reset-filters').addEventListener('click', () => {
    document.getElementById('filter-category').value = '';
    document.getElementById('filter-silver-type').value = '';
    document.getElementById('filter-fineness').value = '';
    document.getElementById('price-min').value = '';
    document.getElementById('price-max').value = '';
    document.getElementById('filter-stones').value = '';
    document.getElementById('filter-stone-type').value = '';
    document.getElementById('filter-discount').value = '';
    document.getElementById('sort-select').value = '-created_at';
    currentPage = 1;
    loadProducts();
});
document.getElementById('sort-select').addEventListener('change', () => { currentPage = 1; loadProducts(); });
document.getElementById('confirm-add-to-cart').addEventListener('click', addToCart);

document.addEventListener('click', function(e) {
    const btn = e.target.closest('.btn-cart');
    if (btn && btn.classList.contains('btn-cart')) {
        const productId = parseInt(btn.dataset.productId);
        const sizes = JSON.parse(btn.dataset.sizes);
        openSizeModal(productId, sizes);
    }
});

const priceMinInput = document.getElementById('price-min');
const priceMaxInput = document.getElementById('price-max');
if (priceMinInput) {
    priceMinInput.addEventListener('input', function() {
        if (this.value && parseFloat(this.value) < 0) this.value = 0;
    });
}
if (priceMaxInput) {
    priceMaxInput.addEventListener('input', function() {
        if (this.value && parseFloat(this.value) < 0) this.value = 0;
    });
}

loadCategories();
loadProducts();
</script>
{% endblock %}
